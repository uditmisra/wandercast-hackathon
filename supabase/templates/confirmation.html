<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm your email</title>
</head>
<body style="margin:0;padding:0;background-color:#EBEBEB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#EBEBEB;padding:40px 20px;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;">
          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <img src="https://edinburgh-whispers-route.lovable.app/email-header.png" alt="Wandercast" width="300" height="60" style="display:block;border:0;outline:none;max-width:300px;height:auto;" />
            </td>
          </tr>
          <!-- Card -->
          <tr>
            <td style="background-color:#ffffff;border-radius:16px;padding:40px 36px;border:1px solid rgba(0,0,0,0.06);">
              <h1 style="margin:0 0 8px;font-size:24px;font-weight:700;color:#0A0A0A;line-height:1.2;">Welcome aboard</h1>
              <p style="margin:0 0 24px;font-size:15px;color:#0A0A0A;opacity:0.6;line-height:1.6;">
                Confirm your email to start creating personalised audio tours in any city.
              </p>
              <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;background-color:#0A0A0A;color:#EBEBEB;text-decoration:none;padding:14px 32px;border-radius:100px;font-size:13px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;">
                Confirm Email
              </a>
              <p style="margin:28px 0 0;font-size:12px;color:#0A0A0A;opacity:0.35;line-height:1.5;">
                If you didn't create a Wandercast account, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-size:11px;color:#0A0A0A;opacity:0.3;">
                Wandercast &mdash; AI-powered audio tours
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
