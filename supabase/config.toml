project_id = "oyzozaqvykslverwctim"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv6"
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"
image_transformation = { enabled = false }

[auth]
enabled = true
site_url = "https://edinburgh-whispers-route.lovable.app"
additional_redirect_urls = ["https://d0cdb7ca-a47e-4148-b010-a13909fca1f3.lovableproject.com/**", "https://edinburgh-whispers-route.lovable.app/**", "https://id-preview--d0cdb7ca-a47e-4148-b010-a13909fca1f3.lovable.app/**", "https://preview--edinburgh-whispers-route.lovable.app/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
max_frequency = "1m0s"

[auth.email.template.confirmation]
subject = "Welcome to Wandercast — Confirm your email"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your Wandercast password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Your Wandercast sign-in link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.email_change]
subject = "Confirm your new email — Wandercast"
content_path = "./supabase/templates/email_change.html"

[auth.email.template.invite]
subject = "You've been invited to Wandercast"
content_path = "./supabase/templates/invite.html"

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }} ."
max_frequency = "5s"

[edge_runtime]
enabled = true
policy = "per_worker"